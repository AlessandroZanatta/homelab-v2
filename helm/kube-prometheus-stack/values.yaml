---
crds:
  enabled: true
  upgradeJob:
    enabled: true
    # Conflicts with ArgoCD, force it, ArgoCD will fix it later
    forceConflicts: true

extraManifests:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: grafana-oidc-client-secret
      namespace: prometheus
    data:
      client_secret: "{{ .Values.secrets.client_secret | b64enc }}"

grafana:
  enabled: true

  sidecar:
    dashboards:
      enabled: true
    datasources:
      watchMethod: "SLEEP"

  defaultDashboardsTimezone: Europe/Rome

  additionalDataSources:
    - access: proxy
      isDefault: false
      name: loki
      orgId: 1
      type: loki
      url: http://loki.loki.svc.cluster.local:3100
      version: 1

  grafana.ini:
    server:
      root_url: "https://grafana.kalexlab.xyz"

    auth.generic_oauth:
      enabled: true
      name: Authelia
      client_id: vP36vqAl-kDRRlq0~88S1u-2jdyyktDkLDuPsHmwHp0oDnuBRg-KH4DeJXaAWXBXU4.uL7YK
      client_secret: "$__file{/etc/secrets/grafana_oidc_client_secret/client_secret}"
      scopes: openid profile email groups
      empty_scopes: false
      login_attribute_path: preferred_username
      groups_attribute_path: groups
      name_attribute_path: name
      role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
      use_pkce: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: true
          editable: false
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      argocd:
        # renovate: datasource=github-tags depName=argoproj/argo-cd
        url: "https://raw.githubusercontent.com/argoproj/argo-cd/refs/tags/v3.4.2/examples/dashboard.json"
        datasource: Prometheus
      cloudnative-pg:
        # renovate: depName="Dashboard - CNPG"
        gnetId: 20417
        revision: 4
        datasource: Prometheus
      smartctl-exporter:
        # renovate: depName="Dashboard - smartCTL"
        gnetId: 24922
        revision: 1
        datasource: Prometheus
      velero:
        # renovate: depName="Dashboard - Velero"
        gnetId: 16829
        revision: 5
        datasource: Prometheus
      kubernetes-views-global:
        # renovate: depName="Dashboard - Kubernetes / Views / Global"
        gnetId: 15757
        revision: 43
        datasource: Prometheus
      longhorn:
        # renovate: depName="Dashboard - Longhorn"
        gnetId: 16888
        revision: 10
        datasource: Prometheus
      node-exporter-temperature:
        # renovate: depName="Dashboard - Node exporter temperatures"
        gnetId: 15202
        revision: 1
        datasource: Prometheus
      traefik:
        # renovate: depName="Dashboard - Traefik"
        gnetId: 17346
        revision: 9
        datasource: Prometheus
      trivy:
        # renovate: depName="Dashboard - Trivy"
        gnetId: 16337
        revision: 16
        datasource: Prometheus

  extraSecretMounts:
    - name: grafana-oidc-client-secret
      secretName: grafana-oidc-client-secret
      mountPath: /etc/secrets/grafana_oidc_client_secret

prometheusOperator:
  tls:
    enabled: false
  admissionWebhooks:
    enabled: false

prometheus:
  enabled: true

  prometheusSpec:
    ## If true, a nil or {} value for prometheus.prometheusSpec.serviceMonitorSelector will cause the
    ## prometheus resource to be created with selectors based on values in the helm deployment,
    ## which will also match the servicemonitors created
    serviceMonitorSelectorNilUsesHelmValues: false

    ## If true, a nil or {} value for prometheus.prometheusSpec.podMonitorSelector will cause the
    ## prometheus resource to be created with selectors based on values in the helm deployment,
    ## which will also match the podmonitors created
    podMonitorSelectorNilUsesHelmValues: false

    ## External URL at which Prometheus will be reachable.
    ##
    externalUrl: "https://prometheus.kalexlab.xyz"

    storageSpec:
      volumeClaimTemplate:
        metadata:
          name: prometheus-data-pvc
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 75Gi

    thanosService:
      enabled: true

    thanosServiceMonitor:
      enabled: true

    # Bugged, not added to prometheus.monitoring.coreos.com/prometheus-kube-prometheus-prometheus even though it really should
