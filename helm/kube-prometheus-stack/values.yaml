alertmanager:
  templateFiles:
    telegram.tmpl: |
      {{- define "telegram.ctx" -}}
      {{- with .Labels.name }}[<code>{{ . }}</code>]{{ end -}}
      {{- with .Labels.cluster }} cluster=<code>{{ . }}</code>{{ end -}}
      {{- with .Labels.namespace }} ns=<code>{{ . }}</code>{{ end -}}
      {{- with .Labels.dest_namespace }}→<code>{{ . }}</code>{{ end -}}
      {{- with .Labels.pod }} <code>{{ . }}</code>{{ end -}}
      {{- with .Labels.node }} node=<code>{{ . }}</code>{{ end -}}
      {{- with .Labels.persistentvolumeclaim }} pvc=<code>{{ . }}</code>{{ end -}}
      {{- end }}

      {{- define "telegram.message" -}}
      {{ if gt (len .Alerts.Firing) 0 -}}
      🔥 <b>{{ len .Alerts.Firing }} firing</b>{{ with .GroupLabels.alertname }} — <i>{{ . }}</i>{{ end }}
      {{ range .Alerts.Firing -}}
      {{ if eq .Labels.severity "critical" }}🔴{{ else if eq .Labels.severity "warning" }}🟡{{ else }}🔵{{ end -}}
      <b>{{ .Labels.alertname }}</b>{{ with .Annotations.summary }} — {{ . }}{{ end }}
      {{- template "telegram.ctx" . }}
      {{ end -}}
      {{ end -}}
      {{- if gt (len .Alerts.Resolved) 0 -}}
      ✅ <b>{{ len .Alerts.Resolved }} resolved</b>
      {{ range .Alerts.Resolved -}}
      • <b>{{ .Labels.alertname }}</b>{{ template "telegram.ctx" . }}
      {{ end -}}
      {{- end -}}
      {{- end }}

  enabled: true
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: "null"
      routes:
        - match:
            severity: "critical"
          receiver: "telegram"
          group_by: ["alertname", "severity"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 24h

coreDns:
  # Service exposed by coreDns itself, appears to not be working otherwise
  service:
    selector:
      app.kubernetes.io/name: coredns

kubeEtcd:
  # Control plane virtual IP from talos/machine/vip.yaml and talos/talenv.prod.yaml
  endpoints:
    - 192.168.10.9

  service:
    enabled: true
    port: 2381
    targetPort: 2381

kubeProxy:
  enabled: false

defaultRules:
  disabled:
    KubeProxyDown: true
