---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  namespace: cabling
  name: cabling-certificate
spec:
  commonName: cabling.kalexlab.xyz
  secretName: cabling-ingress-certificate-secret
  dnsNames:
    - cabling.kalexlab.xyz
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  namespace: cabling
  name: cabling-ingress
  annotations:
    external-dns.alpha.kubernetes.io/target: 192.168.10.20
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`cabling.kalexlab.xyz`)
      services:
        - name: eccm-server
          port: 3000
      middlewares:
        - name: authelia-forward-auth
          namespace: sso
  tls:
    secretName: cabling-ingress-certificate-secret
